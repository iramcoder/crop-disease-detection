<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Disease Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌾 AI-Based Crop Disease Detection</h1>
        <p>Upload a crop leaf image to detect possible diseases.</p>

        <div class="card">
            <h2>Upload Leaf Image</h2>
            
            <input type="file" id="imageInput" accept="image/*">
            <br>
            <button id="detectBtn">Detect Disease</button>

            <div class="output-box" id="output">
                Detection result will appear here...
            </div>
        </div>

        <footer>
            © 2026 Crop Disease Detection Project | AIML Mini Project
        </footer>
    </div>

    <!-- External JS -->
    <script src="script.js"></script>

</body>
</html>
